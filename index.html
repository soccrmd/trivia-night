<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Night Pro</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f8f5; color: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f0f0f; color: #ffffff; }
      input, select, textarea { background: #1a1a1a; color: #ffffff; border-color: #333; }
    }
    input, select, textarea { 
      font-family: inherit; 
      border: 1px solid #e0e0e0; 
      border-radius: 8px; 
      padding: 10px; 
      font-size: 14px;
    }
    button { font-family: inherit; font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    @media (prefers-color-scheme: dark) {
      input:focus, select:focus, textarea:focus { outline: none; border-color: #378add; background: #1a1a1a; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const SoundEngine = (() => {
  const audioContext = typeof window !== 'undefined' && window.AudioContext ? new (window.AudioContext || window.webkitAudioContext)() : null;
  return {
    buzz: () => {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    },
    correct: () => {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      [0, 0.1, 0.2].forEach(delay => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(800 + delay * 200, now);
        gain.gain.setValueAtTime(0.2, now + delay);
        gain.gain.exponentialRampToValueAtTime(0, now + delay + 0.15);
        osc.start(now + delay);
        osc.stop(now + delay + 0.15);
      });
    },
    incorrect: () => {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    },
    tada: () => {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      [1046.5, 1318.51, 1567.98].forEach((freq, i) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(freq, now + i * 0.1);
        gain.gain.setValueAtTime(0.2, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0, now + i * 0.1 + 0.2);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.2);
      });
    },
  };
})();

const QUESTIONS = [
  { id: 1, question: 'What is the capital of France?', answer: 'Paris', options: ['London', 'Paris', 'Berlin', 'Madrid'] },
  { id: 2, question: 'Which planet is closest to the Sun?', answer: 'Mercury', options: ['Venus', 'Mercury', 'Earth', 'Mars'] },
  { id: 3, question: 'Who wrote "To Kill a Mockingbird"?', answer: 'Harper Lee', options: ['Harper Lee', 'Mark Twain', 'Ernest Hemingway', 'F. Scott Fitzgerald'] },
  { id: 4, question: 'What is the chemical formula for salt?', answer: 'NaCl', options: ['NaCl', 'KCl', 'CaCl', 'MgCl'] },
  { id: 5, question: 'In what year did the Titanic sink?', answer: '1912', options: ['1905', '1912', '1920', '1898'] },
  { id: 6, question: 'What is the capital of Japan?', answer: 'Tokyo', options: ['Osaka', 'Kyoto', 'Tokyo', 'Yokohama'] },
  { id: 7, question: 'How many strings does a violin have?', answer: '4', options: ['6', '5', '4', '3'] },
  { id: 8, question: 'What is the smallest prime number?', answer: '2', options: ['1', '2', '3', '4'] },
  { id: 9, question: 'Who painted the Mona Lisa?', answer: 'Leonardo da Vinci', options: ['Michelangelo', 'Leonardo da Vinci', 'Raphael', 'Donatello'] },
  { id: 10, question: 'What is the largest ocean?', answer: 'Pacific', options: ['Atlantic', 'Indian', 'Arctic', 'Pacific'] },
  { id: 11, question: 'How many bones in human body?', answer: '206', options: ['186', '206', '226', '246'] },
  { id: 12, question: 'What is the smallest country?', answer: 'Vatican City', options: ['Monaco', 'Liechtenstein', 'Malta', 'Vatican City'] },
  { id: 13, question: 'Who was first US President?', answer: 'George Washington', options: ['Thomas Jefferson', 'George Washington', 'John Adams', 'Benjamin Franklin'] },
  { id: 14, question: 'What is the fastest land animal?', answer: 'Cheetah', options: ['Lion', 'Cheetah', 'Gazelle', 'Greyhound'] },
  { id: 15, question: 'How many sides does a hexagon have?', answer: '6', options: ['5', '6', '7', '8'] },
];

function shuffleOptions(options) {
  const shuffled = [...options].sort(() => Math.random() - 0.5);
  return shuffled;
}

function TriviaApp() {
  const [screen, setScreen] = React.useState('home');
  const [playerName, setPlayerName] = React.useState('');
  const [playerId, setPlayerId] = React.useState(null);
  const [players, setPlayers] = React.useState({});
  const [selectedCategory, setSelectedCategory] = React.useState('All');
  const [timerLength, setTimerLength] = React.useState(10);
  const [numQuestions, setNumQuestions] = React.useState(10);
  
  const [gameState, setGameState] = React.useState({
    phase: 'setup',
    qIndex: 0,
    timer: 10,
    buzzed: null,
    selectedAnswer: null,
    isCorrect: null,
  });

  const getQuestions = () => {
    let q = QUESTIONS;
    return q.slice(0, numQuestions);
  };

  const allQuestions = getQuestions();
  const currentQ = allQuestions[gameState.qIndex];
  const shuffledOptions = currentQ ? shuffleOptions(currentQ.options) : [];

  React.useEffect(() => {
    if (gameState.phase === 'question' && gameState.timer > 0) {
      const t = setTimeout(() => {
        setGameState(prev => ({ ...prev, timer: prev.timer - 1 }));
      }, 1000);
      return () => clearTimeout(t);
    }
    if (gameState.phase === 'question' && gameState.timer === 0) {
      setGameState(prev => ({ ...prev, phase: 'reveal', isCorrect: false }));
    }
  }, [gameState.phase, gameState.timer]);

  const startGame = () => {
    if (allQuestions.length === 0) {
      alert('No questions available.');
      return;
    }
    setGameState({
      phase: 'question',
      qIndex: 0,
      timer: timerLength,
      buzzed: null,
      selectedAnswer: null,
      isCorrect: null,
    });
  };

  const selectAnswer = (selected) => {
    if (gameState.phase !== 'question') return;
    const isCorrect = selected === currentQ.answer;
    
    setGameState(prev => ({
      ...prev,
      phase: 'reveal',
      selectedAnswer: selected,
      isCorrect: isCorrect,
    }));

    if (isCorrect) {
      SoundEngine.correct();
      setPlayers(prev => ({
        ...prev,
        [playerId]: {
          ...prev[playerId],
          score: prev[playerId].score + 100,
        }
      }));
    } else {
      SoundEngine.incorrect();
    }
  };

  const nextQ = () => {
    if (gameState.qIndex + 1 < allQuestions.length) {
      setGameState({
        phase: 'question',
        qIndex: gameState.qIndex + 1,
        timer: timerLength,
        buzzed: null,
        selectedAnswer: null,
        isCorrect: null,
      });
    } else {
      setGameState(prev => ({ ...prev, phase: 'final' }));
    }
  };

  const reset = () => {
    setScreen('home');
    setPlayerName('');
    setPlayerId(null);
    setPlayers({});
    setGameState({ phase: 'setup', qIndex: 0, timer: 10, buzzed: null, selectedAnswer: null, isCorrect: null });
  };

  // HOME
  if (screen === 'home') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem' }}>
        <div style={{ maxWidth: '800px', margin: '0 auto', textAlign: 'center' }}>
          <h1 style={{ fontSize: '48px', fontWeight: 500, margin: '0 0 1rem' }}>Trivia Night Pro</h1>
          <p style={{ fontSize: '16px', color: '#666', margin: '0 0 3rem' }}>Multiple Choice Edition</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', maxWidth: '400px', margin: '0 auto' }}>
            <button onClick={() => { setScreen('host-setup'); }} style={{ padding: '14px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontSize: '14px', fontWeight: 500, cursor: 'pointer' }}>
              Host Game
            </button>
            <button onClick={() => setScreen('join')} style={{ padding: '14px', background: '#f0f0f0', border: '1px solid #ddd', borderRadius: '8px', fontSize: '14px', fontWeight: 500, cursor: 'pointer' }}>
              Join Game
            </button>
          </div>
        </div>
      </div>
    );
  }

  // HOST SETUP
  if (screen === 'host-setup') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem' }}>
        <div style={{ maxWidth: '500px', margin: '0 auto' }}>
          <h2 style={{ fontSize: '24px', fontWeight: 500, margin: '0 0 2rem' }}>Game Settings</h2>
          
          <div style={{ marginBottom: '1.5rem' }}>
            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 500, fontSize: '13px' }}>Timer: {timerLength}s</label>
            <input type="range" min="5" max="30" value={timerLength} onChange={(e) => setTimerLength(parseInt(e.target.value))} style={{ width: '100%' }} />
          </div>

          <div style={{ marginBottom: '2rem' }}>
            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 500, fontSize: '13px' }}>Questions: {numQuestions}</label>
            <input type="range" min="5" max="15" value={numQuestions} onChange={(e) => setNumQuestions(parseInt(e.target.value))} style={{ width: '100%' }} />
          </div>

          <p style={{ fontSize: '12px', color: '#666', marginBottom: '2rem' }}>Available: {allQuestions.length} questions</p>

          <button onClick={() => { startGame(); setScreen('host'); }} style={{ width: '100%', padding: '12px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: 'pointer', marginBottom: '8px' }}>
            Start Game
          </button>
          <button onClick={() => setScreen('home')} style={{ width: '100%', padding: '12px', background: '#f0f0f0', border: '1px solid #ddd', borderRadius: '8px', cursor: 'pointer' }}>
            Back
          </button>
        </div>
      </div>
    );
  }

  // HOST GAME
  if (screen === 'host') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem', display: 'grid', gridTemplateColumns: '2fr 1fr', gap: '2rem' }}>
        <div style={{ padding: '2rem', background: '#f0f0f0', borderRadius: '8px' }}>
          {gameState.phase === 'question' && currentQ && (
            <>
              <p style={{ margin: '0 0 0.5rem', fontSize: '12px', color: '#666' }}>Q{gameState.qIndex + 1}/{allQuestions.length}</p>
              <h2 style={{ margin: '0 0 2rem', fontSize: '20px', fontWeight: 500 }}>{currentQ.question}</h2>
              <div style={{ fontSize: '64px', fontWeight: 500, textAlign: 'center', color: gameState.timer <= 3 ? '#d32f2f' : '#378add', margin: '2rem 0' }}>
                {gameState.timer}
              </div>
              <p style={{ color: '#666', fontSize: '14px', textAlign: 'center' }}>Waiting for player answers...</p>
            </>
          )}
          
          {gameState.phase === 'reveal' && currentQ && (
            <>
              <h3 style={{ margin: '0 0 1rem' }}>Correct Answer</h3>
              <p style={{ fontSize: '18px', fontWeight: 500, background: '#fff3cd', padding: '1rem', borderRadius: '8px', margin: '0 0 1.5rem' }}>
                {currentQ.answer}
              </p>
              <button onClick={nextQ} style={{ width: '100%', padding: '12px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: 'pointer' }}>
                Next
              </button>
            </>
          )}

          {gameState.phase === 'final' && (
            <>
              <h2 style={{ textAlign: 'center', fontSize: '28px', margin: '2rem 0' }}>Game Over!</h2>
              <button onClick={reset} style={{ width: '100%', padding: '12px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: 'pointer' }}>
                Home
              </button>
            </>
          )}
        </div>

        <div style={{ padding: '1.5rem', background: '#f0f0f0', borderRadius: '8px', height: 'fit-content' }}>
          <h3 style={{ margin: '0 0 1rem', fontSize: '14px', fontWeight: 500 }}>Players</h3>
          {Object.values(players).length === 0 ? (
            <p style={{ margin: '0', fontSize: '13px', color: '#666' }}>No players</p>
          ) : (
            Object.values(players).sort((a, b) => b.score - a.score).map((p, i) => (
              <div key={p.uid} style={{ padding: '8px', background: 'white', borderRadius: '6px', marginBottom: '6px', display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}>
                <span style={{ fontWeight: 500 }}>{i + 1}. {p.name}</span>
                <span>{p.score}</span>
              </div>
            ))
          )}
        </div>
      </div>
    );
  }

  // JOIN GAME
  if (screen === 'join') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem' }}>
        <div style={{ maxWidth: '400px', margin: '0 auto' }}>
          <h2 style={{ fontSize: '24px', fontWeight: 500, margin: '0 0 2rem' }}>Join Game</h2>
          <input type="text" placeholder="Your name" value={playerName} onChange={(e) => setPlayerName(e.target.value)} style={{ width: '100%', marginBottom: '1rem' }} />
          <button onClick={() => {
            if (!playerName) return;
            const uid = 'p_' + Math.random().toString(36).substr(2, 9);
            setPlayerId(uid);
            setPlayers(prev => ({ ...prev, [uid]: { uid, name: playerName, score: 0 } }));
            setScreen('waiting');
          }} disabled={!playerName} style={{ width: '100%', padding: '12px', background: playerName ? '#378add' : '#ccc', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: playerName ? 'pointer' : 'not-allowed', marginBottom: '1rem' }}>
            Join
          </button>
          <button onClick={() => setScreen('home')} style={{ width: '100%', padding: '12px', background: '#f0f0f0', border: '1px solid #ddd', borderRadius: '8px', cursor: 'pointer' }}>
            Back
          </button>
        </div>
      </div>
    );
  }

  // WAITING
  if (screen === 'waiting') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem', textAlign: 'center' }}>
        <div style={{ maxWidth: '400px', margin: '0 auto' }}>
          <h2 style={{ fontSize: '24px', fontWeight: 500, margin: '0 0 1rem' }}>Waiting...</h2>
          <p style={{ color: '#666', margin: '0 0 2rem' }}>{playerName}, ready to play!</p>
          <button onClick={() => { startGame(); setScreen('player'); }} style={{ width: '100%', padding: '12px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: 'pointer' }}>
            Start (Demo)
          </button>
        </div>
      </div>
    );
  }

  // PLAYER GAME
  if (screen === 'player') {
    return (
      <div style={{ minHeight: '100vh', padding: '2rem' }}>
        <div style={{ maxWidth: '700px', margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', padding: '1rem', background: '#f0f0f0', borderRadius: '8px', marginBottom: '2rem' }}>
            <div><p style={{ margin: '0', fontSize: '12px', color: '#666' }}>Score</p><p style={{ margin: '0', fontSize: '20px', fontWeight: 500 }}>{players[playerId]?.score || 0}</p></div>
            <p style={{ margin: '0', fontSize: '14px', color: '#666' }}>{playerName}</p>
          </div>

          {gameState.phase === 'question' && currentQ && (
            <>
              <div style={{ padding: '1.5rem', background: '#f0f0f0', borderRadius: '8px', marginBottom: '2rem' }}>
                <p style={{ margin: '0 0 1rem', fontSize: '12px', color: '#666' }}>Q{gameState.qIndex + 1}/{allQuestions.length}</p>
                <h2 style={{ margin: '0', fontSize: '20px', fontWeight: 500 }}>{currentQ.question}</h2>
              </div>
              
              <div style={{ fontSize: '48px', fontWeight: 500, textAlign: 'center', color: gameState.timer <= 3 ? '#d32f2f' : '#378add', marginBottom: '2rem' }}>
                {gameState.timer}s
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px' }}>
                {shuffledOptions.map((option, idx) => (
                  <button 
                    key={idx}
                    onClick={() => selectAnswer(option)}
                    style={{ 
                      padding: '14px', 
                      background: '#378add', 
                      color: 'white', 
                      border: 'none', 
                      borderRadius: '8px', 
                      fontSize: '15px', 
                      fontWeight: 500, 
                      cursor: 'pointer',
                      textAlign: 'left'
                    }}>
                    {option}
                  </button>
                ))}
              </div>
            </>
          )}

          {gameState.phase === 'reveal' && (
            <div style={{ padding: '2rem', background: gameState.isCorrect ? '#c8e6c9' : '#ffcdd2', color: gameState.isCorrect ? '#1b5e20' : '#b71c1c', borderRadius: '8px', textAlign: 'center' }}>
              <h3 style={{ margin: '0 0 1rem', fontSize: '20px' }}>
                {gameState.isCorrect ? '✓ Correct!' : '✗ Incorrect'}
              </h3>
              <p style={{ margin: '0 0 1rem', fontSize: '16px' }}>
                Correct answer: <strong>{currentQ.answer}</strong>
              </p>
              <button onClick={nextQ} style={{ padding: '10px 20px', background: gameState.isCorrect ? '#1b5e20' : '#b71c1c', color: 'white', border: 'none', borderRadius: '6px', fontWeight: 500, cursor: 'pointer' }}>
                Next Question
              </button>
            </div>
          )}

          {gameState.phase === 'final' && (
            <div style={{ textAlign: 'center' }}>
              <h2 style={{ fontSize: '28px', fontWeight: 500, margin: '2rem 0' }}>Game Over!</h2>
              <p style={{ fontSize: '18px', fontWeight: 500, margin: '0 0 2rem' }}>Final Score: {players[playerId]?.score || 0}</p>
              <button onClick={reset} style={{ padding: '12px 24px', background: '#378add', color: 'white', border: 'none', borderRadius: '8px', fontWeight: 500, cursor: 'pointer' }}>
                Home
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.render(<TriviaApp />, document.getElementById('root'));
  </script>
</body>
</html>
