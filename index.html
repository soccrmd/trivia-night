  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #1a1a1a;
      min-height: 100vh;
      margin: 0;
    }
    
    input, select { 
      font-family: inherit; 
      border: 2px solid #ddd;
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 14px;
      background: white;
      transition: all 0.3s;
      width: 100%;
    }
    
    input:focus, select:focus { 
      outline: none; 
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    button { 
      font-family: inherit; 
      font-size: 14px; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.3s;
      font-weight: 500;
      border: none;
      padding: 12px 24px;
    }
    
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
    
    .primary-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .secondary-btn {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      animation: slideUp 0.5s ease;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .answer-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      width: 100%;
      text-align: left;
      margin-bottom: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 15px;
    }
    
    .answer-btn:hover:not(:disabled) { transform: translateX(10px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3); }
    .answer-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .timer { font-size: 72px; font-weight: 700; text-align: center; animation: pulse 1s infinite; }
    
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, #f5f7ff 0%, #fff 100%);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 4px solid #667eea;
    }
    
    .category-btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: 2px solid #ddd;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      margin: 6px;
    }
    
    .category-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }
  </style>

    function getSmartFilteredQuestions() {
      // Get all questions matching category
      let filtered = QUESTIONS.filter(q => state.selectedCategory === 'All' || q.category === state.selectedCategory);
      
      // Separate by difficulty
      const easy = filtered.filter(q => q.difficulty === 'Easy');
      const medium = filtered.filter(q => q.difficulty === 'Medium');
      const hard = filtered.filter(q => q.difficulty === 'Hard');
      
      // Build array with smart mix: mostly medium, some easy, some hard
      let result = [];
      const numQuestions = state.numQuestions;
      
      // For 10 questions: ~6 medium, 2 easy, 2 hard
      const numHard = Math.max(1, Math.floor(numQuestions * 0.2));
      const numEasy = Math.max(1, Math.floor(numQuestions * 0.2));
      const numMedium = numQuestions - numHard - numEasy;
      
      // Shuffle and select from each difficulty
      result = result.concat(shuffle(hard).slice(0, numHard));
      result = result.concat(shuffle(easy).slice(0, numEasy));
      result = result.concat(shuffle(medium).slice(0, numMedium));
      
      return shuffle(result);
    }

        const myRank = playersList.findIndex(p => p.uid === state.playerId) + 1;
        app.innerHTML = `<div style="min-height: 100vh; padding: 2rem; display: grid; grid-template-columns: 1fr 280px; gap: 2rem;"><div><div class="card" style="margin-bottom: 2rem; background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%); border: 2px solid #667eea30;"><div style="display: flex; justify-content: space-between;"><div><p style="margin: 0 0 0.5rem; color: #999; font-size: 13px;">Your Score</p><p style="margin: 0; font-size: 32px; font-weight: 700; color: #667eea;">${myScore}</p></div><div style="text-align: right;"><p style="margin: 0 0 0.5rem; color: #999;">${state.playerName}</p><p style="margin: 0; font-size: 24px; font-weight: 700;">${myRank === 1 ? '🥇' : myRank === 2 ? '🥈' : myRank === 3 ? '🥉' : '#' + myRank}</p></div></div></div>${state.gameState?.phase === 'waiting' ? `<div class="card" style="text-align: center; padding: 3rem 2rem;"><h2 style="font-size: 36px; margin: 0 0 1rem;">⏳ Waiting...</h2><p style="font-size: 18px; color: #667eea; margin: 0 0 1rem; font-weight: 600;">Host is getting ready!</p><p style="font-size: 14px; color: #999; margin: 0;">You have ${playersList.length} player${playersList.length !== 1 ? 's' : ''} in the game</p></div>` : q ? `<div class="card" style="margin-bottom: 2rem;"><p style="margin: 0 0 0.5rem; color: #667eea; font-size: 12px; font-weight: 600; text-transform: uppercase;">📌 ${q.type} • ${q.difficulty}</p><p style="margin: 0 0 1rem; color: #999;">Q${state.gameState.qIndex + 1}/${state.numQuestions}</p><h2 style="margin: 0; font-size: 26px; line-height: 1.4;">${q.question}</h2></div>${state.gameState.phase === 'question' ? `<div style="text-align: center; padding: 1.5rem; background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%); border-radius: 16px; margin-bottom: 2rem; border: 2px solid #667eea30;"><div class="timer" style="font-size: 56px; color: ${state.gameState.timer <= 3 ? '#ff6b6b' : '#667eea'};">${state.gameState.timer}</div></div><div>${state.gameState.timer > 0 ? shuffle(q.options).map(opt => `<button class="answer-btn" onclick="selectAnswer('${opt}')">${opt}</button>`).join('') : `<div style="padding: 2rem; background: #ffcdd220; border-radius: 12px; text-align: center;"><p style="margin: 0; font-weight: 600; color: #b71c1c;">⏱️ Time's Up!</p></div>`}</div>` : `<div class="card" style="background: ${state.players[state.playerId]?.isCorrect ? '#c8e6c920' : '#ffcdd220'}; border: 3px solid ${state.players[state.playerId]?.isCorrect ? '#4caf50' : '#d32f2f'}; text-align: center;"><h3 style="margin: 0 0 1rem; font-size: 32px; color: ${state.players[state.playerId]?.isCorrect ? '#1b5e20' : '#b71c1c'};">${state.players[state.playerId]?.isCorrect ? '✅ Correct!' : '❌ Incorrect'}</h3><p style="margin: 0 0 1rem; color: #333;">Answer: <strong>${q.answer}</strong></p>${state.players[state.playerId]?.pointsEarned ? `<p style="margin: 0; font-size: 20px; font-weight: 700; color: ${state.players[state.playerId]?.isCorrect ? '#1b5e20' : '#b71c1c'};">+${state.players[state.playerId].pointsEarned} points!</p>` : ''}</div>`}` : ''}</div><div class="card" style="max-height: 90vh; overflow-y: auto;"><h3 style="margin: 0 0 1.5rem; font-size: 14px; font-weight: 700; text-transform: uppercase;">🏅 Leaderboard</h3>${playersList.map((p, i) => `<div class="leaderboard-item" style="border: ${p.uid === state.playerId ? '2px solid #667eea' : 'unset'};"><span style="font-weight: 600;">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}. ${p.name}</span><span style="font-weight: 700; color: #667eea;">${p.score}</span></div>`).join('')}</div></div>`;
      }
    }

    function goHome() { state.screen = 'home'; render(); }
    function hostSetup() { state.screen = 'host-setup'; state.role = 'host'; render(); }
    function goJoin() { state.screen = 'join'; render(); }
    function selectCategory(cat) { state.selectedCategory = cat; state.numQuestions = Math.min(state.numQuestions, getAvailableCount()); render(); }

    function startGameHost() {
      if (!firebaseReady || !db) { alert('Firebase not ready'); return; }
      const filtered = getSmartFilteredQuestions();
      if (filtered.length === 0) { alert('No questions available'); return; }
      state.role = 'host';
      state.screen = 'host-game';
      db.ref(`players/${state.gameRoom}`).remove();
      const gameState = { phase: 'waiting', qIndex: 0, timer: state.timerLength, timerLength: state.timerLength, numQuestions: state.numQuestions };
      db.ref(`games/${state.gameRoom}`).set(gameState);
      listenToGame();
      render();
    }

    function hostStartsGame() {
      if (!firebaseReady || !db) return;
      db.ref(`games/${state.gameRoom}`).update({ phase: 'question', timer: state.timerLength });
    }

    function endGame() {
      if (!firebaseReady || !db) return;
      db.ref(`games/${state.gameRoom}`).remove();
      db.ref(`players/${state.gameRoom}`).remove();
      state.screen = 'host-setup';
      state.gameState = null;
      state.players = {};
      state.playerId = null;
      state.playerName = '';
      render();
    }

    function joinGame() {
      if (!firebaseReady || !db) { alert('Firebase not ready'); return; }
      const room = document.getElementById('joinRoom').value;
      const name = document.getElementById('playerName').value;
      if (!name) { alert('Enter a name'); return; }
      state.gameRoom = room;
      state.playerName = name;
      state.playerId = 'p_' + Math.random().toString(36).substr(2, 9);
      state.role = 'player';
      db.ref(`players/${state.gameRoom}/${state.playerId}`).set({ uid: state.playerId, name, score: 0, lastAnswer: null, isCorrect: null, pointsEarned: 0 });
      state.screen = 'player-game';
      listenToGame();
      render();
    }

    function selectAnswer(answer) {
      if (!firebaseReady || !db) return;
      if (state.gameState?.phase !== 'question') return;
      const filtered = getSmartFilteredQuestions();
      const q = filtered[state.gameState.qIndex];
      const isCorrect = answer === q.answer;
      const timeSpent = state.timerLength - state.gameState.timer;
      const speedBonus = isCorrect ? Math.max(0, (state.timerLength - timeSpent) * 5) : 0;
      const totalPoints = (isCorrect ? 100 : 0) + speedBonus;
      const newScore = (state.players[state.playerId]?.score || 0) + totalPoints;
      db.ref(`players/${state.gameRoom}/${state.playerId}`).update({ score: newScore, lastAnswer: answer, isCorrect, pointsEarned: totalPoints });
      db.ref(`games/${state.gameRoom}`).update({ phase: 'reveal' });
      render();
    }

    function nextQuestion() {
      if (!firebaseReady || !db) return;
      if (state.gameState.qIndex + 1 < state.numQuestions) {
        db.ref(`games/${state.gameRoom}`).update({ phase: 'question', qIndex: state.gameState.qIndex + 1, timer: state.timerLength });
      } else {
        db.ref(`games/${state.gameRoom}`).update({ phase: 'final' });
      }
    }

    function listenToGame() {
      if (!db) return;
      db.ref(`games/${state.gameRoom}`).on('value', (snap) => { 
        const oldPhase = state.gameState?.phase;
        state.gameState = snap.val();
        if (oldPhase !== state.gameState?.phase) {
          render();
        } else {
          updateTimerDisplay();
        }
      });
      db.ref(`players/${state.gameRoom}`).on('value', (snap) => { state.players = snap.val() || {}; render(); });
    }

    function updateTimerDisplay() {
      const timerEl = document.querySelector('.timer');
      if (timerEl && state.gameState?.timer !== undefined) {
        timerEl.textContent = state.gameState.timer;
        timerEl.style.color = state.gameState.timer <= 3 ? '#ff6b6b' : '#667eea';
      }
    }

    setInterval(() => {
      if (!db || !state.gameState?.phase) return;
      if (state.gameState.phase === 'question' && state.gameState.timer > 0) {
        db.ref(`games/${state.gameRoom}/timer`).set(state.gameState.timer - 1);
      }
    }, 1000);

    initFirebase();
  </script>
</body>
</html>
